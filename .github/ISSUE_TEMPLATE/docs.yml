name: "📚 Documentação"
description: "Melhorias na documentação e guides"
title: "[DOCS] - "
labels: ["type:documentation"]
assignees: []

body:
  - type: markdown
    attributes:
      value: "## 📝 Descrição"

  - type: textarea
    id: description
    attributes:
      label: "O que documentar?"
      description: "Qual parte precisa de documentação?"
      placeholder: "Ex: Adicionar guia de autenticação com JWT..."
    validations:
      required: true

  - type: markdown
    attributes:
      value: "## 🎯 Objetivo"

  - type: textarea
    id: objective
    attributes:
      label: "Por que esta documentação é necessária?"
      description: "Qual é o benefício?"
      placeholder: "Ex: Novos usuários têm dificuldade em fazer setup..."
    validations:
      required: true

  - type: markdown
    attributes:
      value: "## 📄 Arquivos Afetados"

  - type: textarea
    id: files
    attributes:
      label: "Arquivo(s) a serem criados/alterados"
      description: "Quais documentos serão criados ou modificados?"
      value: |
        - [ ] README.md
        - [ ] docs/SETUP.md
        - [ ] docs/API.md
        - [ ] Outro:
    validations:
      required: true

  - type: markdown
    attributes:
      value: "## 📚 Estrutura"

  - type: textarea
    id: structure
    attributes:
      label: "Estrutura da Documentação"
      description: "Como será organizado o conteúdo?"
      value: |
        - Seção 1
        - Seção 2
        - Seção 3
    validations:
      required: true

  - type: markdown
    attributes:
      value: "## ✅ Critérios de Aceite"

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: "Critérios de Aceite"
      description: "O que define como 'pronto'?"
      value: |
        - [ ] Documentação clara e bem estruturada
        - [ ] Exemplos práticos inclusos
        - [ ] Links internos funcionando
        - [ ] Revisão realizada
    validations:
      required: true

  - type: markdown
    attributes:
      value: "## 🔍 Contexto"

  - type: dropdown
    id: doc-type
    attributes:
      label: "Tipo de Documentação"
      description: "Qual categoria?"
      options:
        - Guia de Setup
        - Guia de API
        - Guia de Contribuição
        - Architecture Decision Record (ADR)
        - Tutorial/How-To
        - Referência
        - Outro
    validations:
      required: true

  - type: textarea
    id: additional-notes
    attributes:
      label: "Notas Adicionais"
      description: "Links, referências, ou informações extras"
      placeholder: "Templates, inspirações, links úteis..."
