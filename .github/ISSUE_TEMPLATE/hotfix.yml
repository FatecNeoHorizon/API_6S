name: "🚨 Hotfix"
description: "Correção crítica urgente"
title: "[HOTFIX] - "
labels: ["type:hotfix", "urgent"]
assignees: []

body:
  - type: markdown
    attributes:
      value: "## 🚨 Descrição do Problema Crítico"

  - type: textarea
    id: description
    attributes:
      label: "O que está quebrado?"
      description: "Descreva o problema crítico que precisa de correção imediata"
      placeholder: "Ex: Pipeline ETL travando ao ingerir UCBT_tab — sistema sem dados atualizados..."
    validations:
      required: true

  - type: textarea
    id: impact
    attributes:
      label: "Impacto"
      description: "Quais funcionalidades estão comprometidas?"
      placeholder: "Ex: Indicadores DEC/FEC não estão sendo atualizados. Afeta dashboard principal e sprint review..."
    validations:
      required: true

  - type: markdown
    attributes:
      value: "## 🔁 Como Reproduzir"

  - type: textarea
    id: steps
    attributes:
      label: "Passos para reproduzir"
      value: |
        1. 
        2. 
        3. 
    validations:
      required: true

  - type: textarea
    id: error-output
    attributes:
      label: "Erro / Stack trace"
      render: shell

  - type: markdown
    attributes:
      value: "## 🗂️ Rastreabilidade"

  - type: dropdown
    id: sprint
    attributes:
      label: "Sprint afetada"
      options:
        - Sprint 1
        - Sprint 2
        - Sprint 3
    validations:
      required: true

  - type: input
    id: related-task
    attributes:
      label: "Task relacionada"
      placeholder: "Ex: TASK-06"

  - type: markdown
    attributes:
      value: "## 🏷️ Classificação"

  - type: dropdown
    id: domain
    attributes:
      label: "Domínio"
      options:
        - "[BACK]"
        - "[FRONT]"
        - "[INFRA]"
        - "[DATA]"
        - "[ML]"
        - "[SEC]"
    validations:
      required: true

  - type: markdown
    attributes:
      value: "## 🩹 Solução Proposta"

  - type: textarea
    id: solution
    attributes:
      label: "Como será corrigido?"
      placeholder: "Ex: Reduzir chunk size de 100k para 50k linhas e adicionar retry em caso de timeout..."
    validations:
      required: true

  - type: input
    id: estimate
    attributes:
      label: "Estimativa de resolução"
      placeholder: "Ex: 2h"
    validations:
      required: true

  - type: markdown
    attributes:
      value: "## ✅ Critérios de Resolução"

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: "Como validar que o problema foi resolvido?"
      value: |
        - [ ] Problema não reproduz mais
        - [ ] Funcionalidade crítica restaurada
        - [ ] Testado localmente via Docker Compose
        - [ ] PR revisado e mergeado
    validations:
      required: true

  - type: textarea
    id: additional-notes
    attributes:
      label: "Notas adicionais"
      placeholder: "Logs, prints ou contexto extra..."