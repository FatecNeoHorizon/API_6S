name: Burndown Chart Generation

on:
  schedule:
    # Runs daily at 18:45 (UTC)
    - cron: '45 18 * * *'
  
  workflow_dispatch:
    # Allows manual execution

concurrency:
  group: burndown-generation-sprint-1
  cancel-in-progress: false

permissions:
  contents: write
  issues: read

jobs:
  generate-burndown:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      
      - name: Build with Maven
        working-directory: ./burndown
        run: mvn clean package -DskipTests
      
      - name: Run Burndown Chart Generation
        working-directory: ./burndown
        env:
          GITHUB_TOKEN: ${{ secrets.ISSUE_TOKEN_API }}
          SPRING_MAIN_WEB_APPLICATION_TYPE: none
        run: |
          if [ -z "$GITHUB_TOKEN" ]; then
            echo "❌ ERROR: ISSUE_TOKEN_API secret is not configured!"
            exit 1
          fi

          echo "Running burndown in CLI mode..."
          java -jar target/burndown-0.0.1-SNAPSHOT.jar --spring.main.web-application-type=none

      - name: Commit and Push changes (PNG + README cache-busting)
        working-directory: ./burndown
        run: |
          set -euo pipefail

          PNG_PATH="src/main/resources/static/burndown.png"
          README_PATH="../README.md"

          if [ -n "$(git status --porcelain -- "$PNG_PATH")" ]; then
            git config --local user.email "action@github.com"
            git config --local user.name "GitHub Action"

            # Updates the main README to:
            # - point to the correct path inside the burndown folder
            # - add cache busting to avoid stale image from cache
            #
            # Final example in README:
            # <img src="burndown/src/main/resources/static/burndown.png?v=<sha>">
            if [ -f "$README_PATH" ]; then
              VERSION="${GITHUB_SHA}"

              # 1) Fixes old cases that were using src="burndown/src..."
              # 2) Ensures ?v=... exists and updates its value
              sed -i \
                -e 's/src="burndown\/src\/main\/resources\/static\/burndown\.png[^"]*"/src="burndown\/src\/main\/resources\/static\/burndown.png?v='"${VERSION}"'"/g' \
                -e 's/src="src\/main\/resources\/static\/burndown\.png[^"]*"/src="burndown\/src\/main\/resources\/static\/burndown.png?v='"${VERSION}"'"/g' \
                "$README_PATH"
            else
              echo "Main README not found at $README_PATH; skipping README update."
            fi

            git add "$PNG_PATH"
            if [ -f "$README_PATH" ]; then
              git add "$README_PATH"
            fi

            git commit -m "chore: update burndown chart"

            # Avoids non-fast-forward error when remote has advanced during the job.
            for attempt in 1 2 3; do
              git pull --rebase origin sprint-1 && git push origin HEAD:sprint-1 && break
              echo "Push attempt $attempt failed; retrying..."
              sleep 2
            done
          else
            echo "No changes in chart to commit"
          fi