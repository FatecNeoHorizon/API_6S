name: "📚 Documentation"
description: "Create or update documentation"
title: "[DOCS] - "
labels: ["type:documentation"]
assignees: []

body:
  - type: markdown
    attributes:
      value: "## 📚 Description"

  - type: textarea
    id: description
    attributes:
      label: "What needs to be documented?"
      placeholder: "Ex: Update BDGD data dictionary with decisions made in Sprint 2..."
    validations:
      required: true

  - type: dropdown
    id: doc-type
    attributes:
      label: "Documentation type"
      options:
        - README / Sprint
        - Data dictionary (BDGD)
        - Swagger / API
        - ML metrics
        - Architecture / Technical decisions
        - LGPD / ROPA
        - Setup / onboarding guide
        - Other
    validations:
      required: true

  - type: markdown
    attributes:
      value: "## 🗂️ Traceability"

  - type: dropdown
    id: sprint
    attributes:
      label: "Sprint"
      options:
        - Sprint 1
        - Sprint 2
        - Sprint 3
        - General
    validations:
      required: true

  - type: input
    id: related-requirement
    attributes:
      label: "Related requirement"
      description: |
        Link directly to the requirement in the README using markdown.
        Example: [RF01](../../README.md#RF01)
        The README must have an anchor like <a id="RF01"> on the requirement line.
      placeholder: "[RF01](../../README.md#RF01)"

  - type: input
    id: related-user-stories
    attributes:
      label: "Related user story"
      description: |
        Link directly to the user story in the README using markdown.
        Example: [US01](../../README.md#backlog-do-produto)
        To link a specific US, add an anchor like <a id="US01"> to the README backlog table.
      placeholder: "[US01](../../README.md#backlog-do-produto)"

  - type: markdown
    attributes:
      value: "## ✅ Acceptance Criteria"

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: "Acceptance Criteria"
      value: |
        - [ ] Document created or updated
        - [ ] Reviewed by at least one team member
        - [ ] Available in the repository
        - [ ] Links updated in the main README (if needed)
    validations:
      required: true