name: "✨ Feature"
description: "Nova funcionalidade"
title: "[FEATURE] - "
labels: ["type:feature"]
assignees: []

body:
  - type: markdown
    attributes:
      value: "## 📝 Descrição"

  - type: textarea
    id: description
    attributes:
      label: "Descrição"
      description: "Descreva a funcionalidade que será desenvolvida"
      placeholder: "Ex: Implementar endpoint de criticidade consumindo o modelo K-Means..."
    validations:
      required: true

  - type: markdown
    attributes:
      value: "## 🎯 Objetivo"

  - type: textarea
    id: objective
    attributes:
      label: "Qual problema resolve ou valor agrega?"
      placeholder: "Ex: Permitir que o analista filtre regiões por criticidade via API..."
    validations:
      required: true

  - type: markdown
    attributes:
      value: "## 🗂️ Rastreabilidade"

  - type: dropdown
    id: sprint
    attributes:
      label: "Sprint onde o bug foi encontrado"
      options:
        - Sprint 1
        - Sprint 2
        - Sprint 3
    validations:
      required: true

  - type: input
    id: related-task
    attributes:
      label: "Task relacionada (se houver)"
      placeholder: "Ex: TASK-08"

  - type: input
    id: related-requirement
    attributes:
      label: "Requisito relacionado"
      placeholder: "Ex: RF-01, RF-02, RNF-05"

  - type: textarea
    id: related-user-stories
    attributes:
      label: "User Stories relacionadas"
      placeholder: |
        Ex:
        - US-12: Como usuário, espero que o endpoint retorne 200...
        - US-07: Como analista, preciso que os filtros funcionem corretamente...

  - type: markdown
    attributes:
      value: "## 🏷️ Classificação"

  - type: dropdown
    id: domain
    attributes:
      label: "Domínio"
      description: "Área técnica desta task"
      options:
        - "[BACK]"
        - "[FRONT]"
        - "[INFRA]"
        - "[DATA]"
        - "[ML]"
        - "[SEC]"
        - "[QA]"
        - "[DOC]"
        - "[BACK][SEC]"
        - "[FRONT][SEC]"
        - "[ML][DATA]"
        - "[DOC][ML]"
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: "Prioridade"
      options:
        - Highest
        - High
        - Medium
        - Low
    validations:
      required: true

  - type: input
    id: estimate
    attributes:
      label: "Estimativa"
      placeholder: "Ex: 6h"
    validations:
      required: true

  - type: markdown
    attributes:
      value: "## ✅ Critérios de Aceite"

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: "Critérios de Aceite"
      description: "O que deve estar feito para considerar completo?"
      value: |
        - [ ] Funcionalidade implementada
        - [ ] Documentado no Swagger (se endpoint)
        - [ ] Testes básicos validados
        - [ ] Código revisado via PR
    validations:
      required: true

  - type: markdown
    attributes:
      value: "## 📦 Impacto Técnico"

  - type: textarea
    id: affected-modules
    attributes:
      label: "Módulos / Camadas afetadas"
      placeholder: "Ex: backend/routers, frontend/pages/criticidade..."

  - type: textarea
    id: bdgd-layers
    attributes:
      label: "Layers da BDGD envolvidos"
      description: "Preencher se a task lê ou processa dados da BDGD"
      placeholder: "Ex: CTMT (PERD_MED), UCBT_tab (DIC_XX)..."

  - type: textarea
    id: database-impact
    attributes:
      label: "Impacto no banco de dados"
      description: "Mudanças de schema, novas coleções ou índices necessários?"
      placeholder: "Ex: Criar índice {DIST, CONJ} na coleção CTMT..."

  - type: markdown
    attributes:
      value: "## 🔐 Segurança"

  - type: checkboxes
    id: security-checklist
    attributes:
      label: "Checklist de Segurança"
      options:
        - label: "Validação de inputs implementada"
        - label: "Endpoint protegido por autenticação JWT (se aplicável)"
        - label: "Dados sensíveis não expostos na resposta"

  - type: markdown
    attributes:
      value: "## 📌 Contexto Adicional"

  - type: textarea
    id: additional-notes
    attributes:
      label: "Notas adicionais"
      placeholder: "Links, referências técnicas ou decisões de arquitetura relevantes..."