name: "Auto Create Branch from Issue"

on:
  issues:
    types: [opened, reopened]

jobs:
  create-branch:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract branch info
        id: branch_info
        run: |
          ISSUE_NUM=${{ github.event.issue.number }}
          ISSUE_TITLE="${{ github.event.issue.title }}"
          ISSUE_LABELS="${{ join(github.event.issue.labels.*.name) }}"
          
          # Remove [TYPE] prefixes from title
          CLEAN_TITLE=$(echo "$ISSUE_TITLE" | sed 's/^\[.*\] - *//')
          
          # Convert to kebab-case using sed (simple and robust)
          SLUG=$(echo "$CLEAN_TITLE" | \
            sed 's/[àáâãä]/a/g; s/[èéêë]/e/g; s/[ìíîï]/i/g; s/[òóôõö]/o/g; s/[ùúûü]/u/g; s/[ç]/c/g; s/[ñ]/n/g' | \
            tr '[:upper:]' '[:lower:]' | \
            sed 's/[^a-z0-9]/-/g' | \
            sed 's/-\+/-/g' | \
            sed 's/^-\|-$//')
          
          # Include issue number in branch: number-slug
          BRANCH_NAME="${ISSUE_NUM}-${SLUG}"

          # Determine type based on labels
          TYPE="feature"
          
          # Check type:xxx labels
          if [[ "$ISSUE_LABELS" =~ type:bug ]]; then
            TYPE="bugfix"
          elif [[ "$ISSUE_LABELS" =~ type:hotfix ]] || [[ "$ISSUE_LABELS" == *"urgent"* ]]; then
            TYPE="hotfix"
          elif [[ "$ISSUE_LABELS" =~ type:documentation ]]; then
            TYPE="docs"
          elif [[ "$ISSUE_LABELS" =~ type:research ]]; then
            TYPE="research"
          elif [[ "$ISSUE_LABELS" =~ type:feature ]]; then
            TYPE="feature"
          elif [[ "$ISSUE_LABELS" =~ type:story ]]; then
            TYPE="feature"
          # Fallback labels for compatibility
          elif [[ "$ISSUE_LABELS" == *"bugfix"* ]] || [[ "$ISSUE_LABELS" == *"type:bug"* ]]; then
            TYPE="bugfix"
          elif [[ "$ISSUE_LABELS" == *"docs"* ]] || [[ "$ISSUE_LABELS" == *"type:documentation"* ]]; then
            TYPE="docs"
          elif [[ "$ISSUE_LABELS" == *"research"* ]]; then
            TYPE="research"
          elif [[ "$ISSUE_LABELS" == *"refactor"* ]]; then
            TYPE="refactor"
          elif [[ "$ISSUE_LABELS" == *"perf"* ]]; then
            TYPE="perf"
          elif [[ "$ISSUE_LABELS" == *"test"* ]]; then
            TYPE="test"
          elif [[ "$ISSUE_LABELS" == *"chore"* ]]; then
            TYPE="chore"
          fi
          
          FULL_BRANCH_NAME="${TYPE}/${BRANCH_NAME}"
          
          echo "type=$TYPE" >> $GITHUB_OUTPUT
          echo "branch=$FULL_BRANCH_NAME" >> $GITHUB_OUTPUT
          echo "issue_num=$ISSUE_NUM" >> $GITHUB_OUTPUT
          
          echo "📌 Branch to create: $FULL_BRANCH_NAME"
          echo "📝 Type: $TYPE"
          echo "🔢 Issue: #$ISSUE_NUM"
          echo "🏷️  Labels: $ISSUE_LABELS"

      - name: Create branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Clean any changes in working directory
          git reset --hard HEAD
          git clean -fd
          
          BRANCH="${{ steps.branch_info.outputs.branch }}"
          BRANCH_EXISTS=$(git ls-remote --heads origin "$BRANCH" | wc -l)
          
          if [ "$BRANCH_EXISTS" -eq 0 ]; then
            git checkout -b "$BRANCH"
            git push -u origin "$BRANCH"
            echo "✅ Branch successfully created: $BRANCH"
          else
            echo "⚠️  Branch already exists: $BRANCH"
          fi

      - name: Comment on issue
        uses: actions/github-script@v7
        with:
          script: |
            const branchName = '${{ steps.branch_info.outputs.branch }}';
            const issueNum = ${{ steps.branch_info.outputs.issue_num }};
            const branchType = '${{ steps.branch_info.outputs.type }}';
            
            const typeEmojis = {
              'feature': '✨',
              'bugfix': '🐛',
              'hotfix': '🚨',
              'docs': '📚',
              'research': '🔬',
              'refactor': '♻️',
              'perf': '⚡',
              'test': '🧪',
              'chore': '🔧'
            };
            
            const emoji = typeEmojis[branchType] || '🌳';
            
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `# ${emoji} Branch Automatically Created\n\n\`\`\`bash\ngit checkout ${branchName}\n\`\`\`\n\n**Pattern:** \`type/number-description-in-kebab-case\`\n**Type:** \`${branchType}\`\n**Branch:** \`${branchName}\`\n**Issue:** #${issueNum}`
            });