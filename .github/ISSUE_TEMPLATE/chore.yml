name: "🔧 Chore / Config"
description: "Configuration, infrastructure or setup"
title: "[CONFIG] - "
labels: ["type:chore"]
assignees: []

body:
  - type: markdown
    attributes:
      value: "## 🔧 Description"

  - type: textarea
    id: description
    attributes:
      label: "What needs to be configured?"
      placeholder: "Ex: Set up indexes on MongoDB before ingesting UCBT_tab..."
    validations:
      required: true

  - type: dropdown
    id: config-type
    attributes:
      label: "Configuration type"
      options:
        - Monorepo / Turborepo
        - Docker / Docker Compose
        - MongoDB (schema, indexes, collections)
        - PostgreSQL (schema, migrations)
        - FastAPI (setup, base routes)
        - React (setup, dependencies)
        - GitHub Actions / CI
        - Git Hooks
        - Environment variables
        - Dependencies / packages
        - Other
    validations:
      required: true

  - type: markdown
    attributes:
      value: "## 🗂️ Traceability"

  - type: dropdown
    id: sprint
    attributes:
      label: "Sprint"
      options:
        - Sprint 1
        - Sprint 2
        - Sprint 3
        - General
    validations:
      required: true

  - type: input
    id: related-task
    attributes:
      label: "Related task"
      description: |
        Reference the related GitHub issue using #issue-number.
        Example: #42 — GitHub will automatically create a cross-reference link.
      placeholder: "#42"

  - type: input
    id: related-requirement
    attributes:
      label: "Related requirement"
      description: |
        Link directly to the requirement in the README using markdown.
        Example: [RF01](../../README.md#RF01)
        The README must have an anchor like <a id="RF01"> on the requirement line.
      placeholder: "[RF01](../../README.md#RF01)"

  - type: input
    id: related-user-stories
    attributes:
      label: "Related user story"
      description: |
        Link directly to the user story in the README using markdown.
        Example: [US01](../../README.md#backlog-do-produto)
        To link a specific US, add an anchor like <a id="US01"> to the README backlog table.
      placeholder: "[US01](../../README.md#backlog-do-produto)"

  - type: markdown
    attributes:
      value: "## 🏷️ Classification"

  - type: dropdown
    id: domain
    attributes:
      label: "Domain"
      options:
        - "[INFRA]"
        - "[DATA]"
        - "[BACK]"
        - "[FRONT]"
        - "[QA]"
    validations:
      required: true

  - type: input
    id: estimate
    attributes:
      label: "Estimate"
      placeholder: "Ex: 3h"
    validations:
      required: true

  - type: markdown
    attributes:
      value: "## ✅ Acceptance Criteria"

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: "Acceptance Criteria"
      value: |
        - [ ] Configuration applied and working
        - [ ] Tested locally via Docker Compose
        - [ ] Setup README updated (if needed)
        - [ ] No breakage in other services
    validations:
      required: true