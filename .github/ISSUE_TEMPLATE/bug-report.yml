name: "🐛 Bug Report"
description: "Reportar um comportamento inesperado"
title: "[BUG] - "
labels: ["type:bug"]
assignees: []

body:
  - type: markdown
    attributes:
      value: "## 🐛 Descrição do Bug"

  - type: textarea
    id: description
    attributes:
      label: "O que está acontecendo?"
      description: "Descreva o comportamento inesperado"
      placeholder: "Ex: Endpoint GET /indicadores retorna 500 ao filtrar por tipo_rede=transmissão..."
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: "Comportamento esperado"
      placeholder: "Ex: Deve retornar os indicadores filtrados com status 200..."
    validations:
      required: true

  - type: markdown
    attributes:
      value: "## 🔁 Passos para Reproduzir"

  - type: textarea
    id: steps
    attributes:
      label: "Como reproduzir?"
      value: |
        1. 
        2. 
        3. 
    validations:
      required: true

  - type: textarea
    id: error-output
    attributes:
      label: "Mensagem de erro / Stack trace"
      description: "Cole o erro completo se disponível"
      render: shell

  - type: markdown
    attributes:
      value: "## 🗂️ Rastreabilidade"

  - type: dropdown
    id: sprint
    attributes:
      label: "Sprint onde o bug foi encontrado"
      options:
        - Sprint 1
        - Sprint 2
        - Sprint 3
    validations:
      required: true

  - type: input
    id: related-task
    attributes:
      label: "Task relacionada (se houver)"
      placeholder: "Ex: TASK-08"

  - type: markdown
    attributes:
      value: "## 🏷️ Classificação"

  - type: dropdown
    id: domain
    attributes:
      label: "Domínio"
      options:
        - "[BACK]"
        - "[FRONT]"
        - "[INFRA]"
        - "[DATA]"
        - "[ML]"
        - "[SEC]"
        - "[QA]"
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: "Severidade"
      options:
        - 🔴 Alta — bloqueia funcionalidade crítica
        - 🟡 Média — funcionalidade parcialmente comprometida
        - 🟢 Baixa — comportamento inesperado sem impacto crítico
    validations:
      required: true

  - type: markdown
    attributes:
      value: "## 🌍 Ambiente"

  - type: checkboxes
    id: environment
    attributes:
      label: "Onde o bug ocorre?"
      options:
        - label: "Local (Docker Compose)"
        - label: "Backend (FastAPI)"
        - label: "Frontend (React)"
        - label: "MongoDB"
        - label: "PostgreSQL"

  - type: textarea
    id: additional-notes
    attributes:
      label: "Notas adicionais"
      placeholder: "Prints, logs, ou contexto extra..."