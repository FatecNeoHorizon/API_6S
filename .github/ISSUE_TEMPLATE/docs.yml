name: "📚 Documentação"
description: "Criar ou atualizar documentação"
title: "[DOCS] - "
labels: ["type:docs"]
assignees: []

body:
  - type: markdown
    attributes:
      value: "## 📚 Descrição"

  - type: textarea
    id: description
    attributes:
      label: "O que precisa ser documentado?"
      placeholder: "Ex: Atualizar dicionário de dados BDGD com decisões tomadas na Sprint 2..."
    validations:
      required: true

  - type: dropdown
    id: doc-type
    attributes:
      label: "Tipo de documentação"
      options:
        - README / Sprint
        - Dicionário de dados (BDGD)
        - Swagger / API
        - Métricas de ML
        - Arquitetura / Decisões técnicas
        - LGPD / ROPA
        - Guia de setup / onboarding
        - Outro
    validations:
      required: true

  - type: markdown
    attributes:
      value: "## 🗂️ Rastreabilidade"

  - type: dropdown
    id: sprint
    attributes:
      label: "Sprint"
      options:
        - Sprint 1
        - Sprint 2
        - Sprint 3
        - Geral (não vinculada a sprint)
    validations:
      required: true

  - type: input
    id: related-task
    attributes:
      label: "Task ou requisito relacionado"
      placeholder: "Ex: TASK-23, RNF04"

  - type: markdown
    attributes:
      value: "## 📄 Arquivos Afetados"

  - type: textarea
    id: files
    attributes:
      label: "Quais arquivos serão criados ou atualizados?"
      placeholder: |
        Ex:
        - docs/ML-METRICAS.md (criar)
        - SPRINT-2.md (atualizar seção de arquitetura)
        - BDGD-Dicionario-Dados.docx (atualizar)
    validations:
      required: true

  - type: markdown
    attributes:
      value: "## ✅ Critérios de Aceite"

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: "Critérios de Aceite"
      value: |
        - [ ] Documento criado ou atualizado
        - [ ] Revisado por pelo menos um membro do time
        - [ ] Disponível no repositório
        - [ ] Links atualizados no README principal (se necessário)
    validations:
      required: true

  - type: input
    id: estimate
    attributes:
      label: "Estimativa"
      placeholder: "Ex: 2h"

  - type: textarea
    id: additional-notes
    attributes:
      label: "Notas adicionais"
      placeholder: "Referências, links ou contexto extra..."