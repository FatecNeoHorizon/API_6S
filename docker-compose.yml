services:
  postgres:
    image: postgres:15-alpine
    container_name: postgres_db
    restart: always
    env_file:
      - envs/.env.postgres.${APP_ENV:-dev}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - db_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  flyway:
    image: flyway/flyway:9-alpine
    command: migrate
    env_file:
      - envs/.env.postgres.${APP_ENV:-dev}
      - envs/.env.flyway.${APP_ENV:-dev}
    volumes:
      - ./database/migrations:/flyway/sql
    networks:
      - db_network
    depends_on:
      postgres:
        condition: service_healthy

  mongo:
    image: mongo:8.0
    container_name: mongo_db
    restart: always
    env_file:
      - envs/.env.mongo.${APP_ENV:-dev}
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - app_network
    healthcheck:
      test:
        [
          "CMD",
          "mongosh",
          "--username",
          "${MONGO_INITDB_ROOT_USERNAME}",
          "--password",
          "${MONGO_INITDB_ROOT_PASSWORD}",
          "--eval",
          "db.adminCommand('ping')",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  mongo-express:
    image: mongo-express:latest
    container_name: mongo_express
    restart: always
    ports:
      - "8081:8081"
    env_file:
      - envs/.env.mongo.${APP_ENV:-dev}
    networks:
      - app_network
    depends_on:
      mongo:
        condition: service_healthy

  backend:
    build:
      context: ./apps/backend
    container_name: fastapi_backend
    restart: always
    env_file:
      - envs/.env.backend.${APP_ENV:-dev}
    ports:
      - "8000:8000"
    volumes:
      - ./apps/backend:/app
      - ./data:/app/data
    networks:
      - db_network
      - app_network
    environment:
      - CSV_FILE_PATH=/app/data/indicadores-continuidade-coletivos-2020-2029.csv
    depends_on:
      postgres:
        condition: service_started
      flyway:
        condition: service_completed_successfully
      mongo:
        condition: service_started
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./apps/frontend
    container_name: react_frontend
    restart: always
    env_file:
      - envs/.env.frontend.${APP_ENV:-dev}
    ports:
      - "5173:5173"
    volumes:
      - ./apps/frontend:/app
      - /app/node_modules
      - ./data:/data
    networks:
      - app_network
    depends_on:
      - backend

volumes:
  postgres_data:
  mongo_data:

networks:
  db_network:
  app_network:
