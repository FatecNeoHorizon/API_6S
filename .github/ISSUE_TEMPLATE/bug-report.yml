name: "🐛 Bug Report"
description: "Report an unexpected behavior"
title: "[BUG] - "
labels: ["type:bug"]
assignees: []

body:
  - type: markdown
    attributes:
      value: "## 🐛 Bug Description"

  - type: textarea
    id: description
    attributes:
      label: "What is happening?"
      description: "Describe the unexpected behavior"
      placeholder: "Ex: GET /indicadores endpoint returns 500 when filtering by tipo_rede=transmission..."
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: "Expected behavior"
      placeholder: "Ex: Should return filtered indicators with status 200..."
    validations:
      required: true

  - type: markdown
    attributes:
      value: "## 🔁 Steps to Reproduce"

  - type: textarea
    id: steps
    attributes:
      label: "How to reproduce?"
      value: |
        1. 
        2. 
        3. 
    validations:
      required: true

  - type: textarea
    id: error-output
    attributes:
      label: "Error message / Stack trace"
      description: "Paste the full error if available"
      render: shell

  - type: markdown
    attributes:
      value: "## 🗂️ Traceability"

  - type: dropdown
    id: sprint
    attributes:
      label: "Sprint where the bug was found"
      options:
        - Sprint 1
        - Sprint 2
        - Sprint 3
    validations:
      required: true

  - type: input
    id: related-task
    attributes:
      label: "Related task"
      description: |
        Reference the related GitHub issue using #issue-number.
        Example: #42 — GitHub will automatically create a cross-reference link.
      placeholder: "#42"

  - type: input
    id: related-requirement
    attributes:
      label: "Related requirement"
      description: |
        Link directly to the requirement in the README using markdown.
        Example: [RF01](../../README.md#RF01)
        The README must have an anchor like <a id="RF01"> on the requirement line.
      placeholder: "[RF01](../../README.md#RF01)"

  - type: input
    id: related-user-stories
    attributes:
      label: "Related user story"
      description: |
        Link directly to the user story in the README using markdown.
        Example: [US01](../../README.md#backlog-do-produto)
        To link a specific US, add an anchor like <a id="US01"> to the README backlog table.
      placeholder: "[US01](../../README.md#backlog-do-produto)"

  - type: markdown
    attributes:
      value: "## 🏷️ Classification"

  - type: dropdown
    id: domain
    attributes:
      label: "Domain"
      options:
        - "[BACK]"
        - "[FRONT]"
        - "[INFRA]"
        - "[DOCS]"
        - "[DATA]"
        - "[ML]"
        - "[SEC]"
        - "[QA]"
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: "Severity"
      options:
        - 🔴 High — blocks critical functionality
        - 🟡 Medium — functionality partially compromised
        - 🟢 Low — unexpected behavior with no critical impact
    validations:
      required: true