name: "✨ Feature"
description: "New functionality"
title: "[FEATURE] - "
labels: ["type:feature"]
assignees: []

body:
  - type: markdown
    attributes:
      value: "## 📝 Description"

  - type: textarea
    id: description
    attributes:
      label: "Description"
      description: "Describe the functionality that will be developed"
      placeholder: "Ex: Implement criticality endpoint consuming the K-Means model..."
    validations:
      required: true

  - type: markdown
    attributes:
      value: "## 🎯 Objective"

  - type: textarea
    id: objective
    attributes:
      label: "What problem does it solve or what value does it add?"
      placeholder: "Ex: Allow the analyst to filter regions by criticality via API..."
    validations:
      required: true

  - type: markdown
    attributes:
      value: "## 🗂️ Traceability"

  - type: input
    id: related-requirement
    attributes:
      label: "Related requirement"
      description: |
        Link directly to the requirement in the README using markdown.
        Example: [RF01](../../README.md#RF01)
        The README must have an anchor like <a id="RF01"> on the requirement line.
      placeholder: "[RF01](../../README.md#RF01)"

  - type: input
    id: related-user-stories
    attributes:
      label: "Related user story"
      description: |
        Link directly to the user story in the README using markdown.
        Example: [US01](../../README.md#backlog-do-produto)
        To link a specific US, add an anchor like <a id="US01"> to the README backlog table.
      placeholder: "[US01](../../README.md#backlog-do-produto)"

  - type: markdown
    attributes:
      value: "## 🏷️ Classification"

  - type: dropdown
    id: domain
    attributes:
      label: "Domain"
      description: "Technical area of this task"
      options:
        - "[BACK]"
        - "[FRONT]"
        - "[INFRA]"
        - "[DATA]"
        - "[ML]"
        - "[SEC]"
        - "[QA]"
        - "[DOC]"
        - "[BACK][SEC]"
        - "[FRONT][SEC]"
        - "[ML][DATA]"
        - "[DOC][ML]"
    validations:
      required: true

  - type: markdown
    attributes:
      value: "## ✅ Acceptance Criteria"

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: "Acceptance Criteria"
      description: "What must be done to consider this complete?"
      value: |
        - [ ] Functionality implemented
        - [ ] Documented in Swagger (if endpoint)
        - [ ] Basic tests validated
        - [ ] Code reviewed via PR
    validations:
      required: true

  - type: markdown
    attributes:
      value: "## 🔐 Security"

  - type: checkboxes
    id: security-checklist
    attributes:
      label: "Security Checklist"
      options:
        - label: "Input validation implemented"
        - label: "Endpoint protected by JWT authentication (if applicable)"
        - label: "Sensitive data not exposed in the response"