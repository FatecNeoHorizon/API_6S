name: "🔬 Research / Spike"
description: "Technical investigation or ML experiment"
title: "[RESEARCH] - "
labels: ["type:research"]
assignees: []

body:
  - type: markdown
    attributes:
      value: "## 🔬 Description"

  - type: textarea
    id: description
    attributes:
      label: "What will be investigated or experimented?"
      placeholder: "Ex: Evaluate which clustering algorithm (K-Means vs DBSCAN) produces better separation of regions by criticality..."
    validations:
      required: true

  - type: markdown
    attributes:
      value: "## ❓ Hypothesis"

  - type: textarea
    id: hypothesis
    attributes:
      label: "What is the hypothesis?"
      description: "What do you expect to discover or validate?"
      placeholder: "Ex: K-Means with 3 clusters should produce Silhouette Score > 0.4 using DEC, FEC and PERD_MED as features..."
    validations:
      required: true

  - type: markdown
    attributes:
      value: "## 🧪 Approach"

  - type: textarea
    id: approach
    attributes:
      label: "How will the investigation be conducted?"
      placeholder: |
        Ex:
        1. Prepare dataset aggregated by CONJ (TASK-15)
        2. Train K-Means with k=3
        3. Calculate Silhouette Score
        4. If Score < 0.4, test DBSCAN
        5. Document results in docs/ML-METRICS.md
    validations:
      required: true

  - type: markdown
    attributes:
      value: "## 🎯 Validation Criteria"

  - type: textarea
    id: validation
    attributes:
      label: "How will the result be evaluated?"
      description: "Which metric defines whether the approach worked?"
      placeholder: |
        Ex:
        - Silhouette Score ≥ 0.4 for clustering
        - RMSE ≤ X for regression (define after exploratory analysis)
        - Clusters interpretable in business terms (low/medium/high criticality)
    validations:
      required: true

  - type: markdown
    attributes:
      value: "## 🗂️ Traceability"

  - type: input
    id: related-requirement
    attributes:
      label: "Related requirement"
      description: |
        Link directly to the requirement in the README using markdown.
        Example: [RF01](../../README.md#RF01)
        The README must have an anchor like <a id="RF01"> on the requirement line.
      placeholder: "[RF01](../../README.md#RF01)"

  - type: input
    id: related-user-stories
    attributes:
      label: "Related user story"
      description: |
        Link directly to the user story in the README using markdown.
        Example: [US01](../../README.md#backlog-do-produto)
        To link a specific US, add an anchor like <a id="US01"> to the README backlog table.
      placeholder: "[US01](../../README.md#backlog-do-produto)"

  - type: markdown
    attributes:
      value: "## ✅ Acceptance Criteria"

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: "What must be delivered at the end?"
      value: |
        - [ ] Experiment executed and documented
        - [ ] Validation metric calculated and recorded
        - [ ] Technical decision recorded (which approach to adopt and why)
        - [ ] Result available in docs/ML-METRICS.md
        - [ ] Model saved (joblib) if approved
    validations:
      required: true

  - type: markdown
    attributes:
      value: "## 📌 Expected Output"

  - type: dropdown
    id: expected-output
    attributes:
      label: "What should this research produce?"
      options:
        - Documented technical decision (which approach to use)
        - Trained and saved model
        - Both — decision + model
        - Dataset or prepared features
    validations:
      required: true