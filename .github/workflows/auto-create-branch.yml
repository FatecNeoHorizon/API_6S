name: "Auto Create Branch from Issue"

on:
  issues:
    types: [opened, reopened]

jobs:
  create-branch:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract branch info
        id: branch_info
        run: |
          ISSUE_NUM=${{ github.event.issue.number }}
          ISSUE_TITLE="${{ github.event.issue.title }}"
          ISSUE_LABELS="${{ join(github.event.issue.labels.*.name) }}"
          
          # Remove [TYPE] prefix, emojis, and version numbers (ex: 10.1.3)
          CLEAN_TITLE=$(echo "$ISSUE_TITLE" | \
            sed 's/^\[.*\] *//' | \
            sed 's/[0-9]\+\.[0-9]\+\.[0-9]\+ *- *//' | \
            sed 's/[^\x00-\x7F]//g' | \
            sed 's/^ *//; s/ *$//')
          
          # Convert to kebab-case using sed (simple and robust)
          SLUG=$(echo "$CLEAN_TITLE" | \
            sed 's/[Г ГЎГўГЈГӨ]/a/g; s/[ГЁГ©ГӘГ«]/e/g; s/[Г¬ГӯГ®ГҜ]/i/g; s/[ГІГіГҙГөГ¶]/o/g; s/[Г№ГәГ»Гј]/u/g; s/[Г§]/c/g; s/[Гұ]/n/g' | \
            tr '[:upper:]' '[:lower:]' | \
            sed 's/[^a-z0-9]/-/g' | \
            sed 's/-\+/-/g' | \
            sed 's/^-\|-$//')
          
          # Include issue number in branch: number-slug
          BRANCH_NAME="${ISSUE_NUM}-${SLUG}"

          # Determine type based on labels
          TYPE="feature"

          # type:story вҶ’ branch pai, usa package/
          if [[ "$ISSUE_LABELS" =~ type:story ]]; then
            TYPE="package"
          elif [[ "$ISSUE_LABELS" =~ type:bug ]]; then
            TYPE="bugfix"
          elif [[ "$ISSUE_LABELS" =~ type:hotfix ]] || [[ "$ISSUE_LABELS" == *"urgent"* ]]; then
            TYPE="hotfix"
          elif [[ "$ISSUE_LABELS" =~ type:documentation ]]; then
            TYPE="docs"
          elif [[ "$ISSUE_LABELS" =~ type:research ]]; then
            TYPE="research"
          elif [[ "$ISSUE_LABELS" =~ type:feature ]]; then
            TYPE="feature"
          # Fallback labels para compatibilidade
          elif [[ "$ISSUE_LABELS" == *"bugfix"* ]]; then
            TYPE="bugfix"
          elif [[ "$ISSUE_LABELS" == *"docs"* ]]; then
            TYPE="docs"
          elif [[ "$ISSUE_LABELS" == *"research"* ]]; then
            TYPE="research"
          elif [[ "$ISSUE_LABELS" == *"refactor"* ]]; then
            TYPE="refactor"
          elif [[ "$ISSUE_LABELS" == *"perf"* ]]; then
            TYPE="perf"
          elif [[ "$ISSUE_LABELS" == *"test"* ]]; then
            TYPE="test"
          elif [[ "$ISSUE_LABELS" == *"chore"* ]]; then
            TYPE="chore"
          fi
                    
          FULL_BRANCH_NAME="${TYPE}/${BRANCH_NAME}"
          
          echo "type=$TYPE" >> $GITHUB_OUTPUT
          echo "branch=$FULL_BRANCH_NAME" >> $GITHUB_OUTPUT
          echo "issue_num=$ISSUE_NUM" >> $GITHUB_OUTPUT
          
          echo "рҹ“Ң Branch to create: $FULL_BRANCH_NAME"
          echo "рҹ“қ Type: $TYPE"
          echo "рҹ”ў Issue: #$ISSUE_NUM"
          echo "рҹҸ·пёҸ  Labels: $ISSUE_LABELS"

      - name: Create branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Clean any changes in working directory
          git reset --hard HEAD
          git clean -fd
          
          BRANCH="${{ steps.branch_info.outputs.branch }}"
          BRANCH_EXISTS=$(git ls-remote --heads origin "$BRANCH" | wc -l)
          
          if [ "$BRANCH_EXISTS" -eq 0 ]; then
            git checkout -b "$BRANCH"
            git push -u origin "$BRANCH"
            echo "вң… Branch successfully created: $BRANCH"
          else
            echo "вҡ пёҸ  Branch already exists: $BRANCH"
          fi

      - name: Comment on issue
        uses: actions/github-script@v7
        with:
          script: |
            const branchName = '${{ steps.branch_info.outputs.branch }}';
            const issueNum = ${{ steps.branch_info.outputs.issue_num }};
            const branchType = '${{ steps.branch_info.outputs.type }}';
                        
            const typeEmojis = {
              'package':  'рҹ“Ұ',
              'feature':  'вңЁ',
              'bugfix':   'рҹҗӣ',
              'hotfix':   'рҹҡЁ',
              'docs':     'рҹ“ҡ',
              'research': 'рҹ”¬',
              'refactor': 'вҷ»пёҸ',
              'perf':     'вҡЎ',
              'test':     'рҹ§Ә',
              'chore':    'рҹ”§'
            };
            
            const emoji = typeEmojis[branchType] || 'рҹҢі';
            
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `# ${emoji} Branch Automatically Created\n\n\`\`\`bash\ngit checkout ${branchName}\n\`\`\`\n\n**Pattern:** \`type/number-description-in-kebab-case\`\n**Type:** \`${branchType}\`\n**Branch:** \`${branchName}\`\n**Issue:** #${issueNum}`
            });