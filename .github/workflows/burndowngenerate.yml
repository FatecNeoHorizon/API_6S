name: Burndown Chart Generation

on:
  schedule:
    # Executa diariamente às 18:45 (UTC)
    - cron: '45 18 * * *'
  
  workflow_dispatch:
    # Permite execução manual

concurrency:
  group: burndown-generation-main
  cancel-in-progress: false

permissions:
  contents: write
  issues: read

jobs:
  generate-burndown:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      
      - name: Build with Maven
        working-directory: ./burndown
        run: mvn clean package -DskipTests
      
      - name: Run Burndown Chart Generation
        working-directory: ./burndown
        env:
          GITHUB_TOKEN: ${{ secrets.ISSUE_TOKEN_API }}
          SPRING_MAIN_WEB_APPLICATION_TYPE: none
        run: |
          if [ -z "$GITHUB_TOKEN" ]; then
            echo "❌ ERRO: ISSUE_TOKEN_API secret não está configurado!"
            exit 1
          fi

          echo "Executando burndown em modo CLI..."
          java -jar target/burndown-0.0.1-SNAPSHOT.jar --spring.main.web-application-type=none

      - name: Commit and Push changes (PNG + README cache-busting)
        working-directory: ./burndown
        run: |
          set -euo pipefail

          PNG_PATH="src/main/resources/static/burndown.png"
          README_PATH="../README.md"

          if [ -n "$(git status --porcelain -- "$PNG_PATH")" ]; then
            git config --local user.email "action@github.com"
            git config --local user.name "GitHub Action"

            # Atualiza o README principal para:
            # - apontar para o caminho correto dentro da pasta burndown
            # - adicionar cache busting pra evitar imagem antiga por cache
            #
            # Exemplo final no README:
            # <img src="burndown/src/main/resources/static/burndown.png?v=<sha>">
            if [ -f "$README_PATH" ]; then
              VERSION="${GITHUB_SHA}"

              # 1) Corrige casos antigos que estavam como src="burndown/src..."
              # 2) Garante que exista ?v=... e atualiza o valor
              #
              # Você pode adaptar o padrão se o README tiver variações.
              sed -i \
                -e 's/src="burndown\/src\/main\/resources\/static\/burndown\.png[^"]*"/src="burndown\/src\/main\/resources\/static\/burndown.png?v='"${VERSION}"'"/g' \
                -e 's/src="src\/main\/resources\/static\/burndown\.png[^"]*"/src="burndown\/src\/main\/resources\/static\/burndown.png?v='"${VERSION}"'"/g' \
                "$README_PATH"
            else
              echo "README principal não encontrado em $README_PATH; pulando atualização do README."
            fi

            git add "$PNG_PATH"
            if [ -f "$README_PATH" ]; then
              git add "$README_PATH"
            fi

            git commit -m "chore: atualizar gráfico de burndown"

            # Evita erro de non-fast-forward quando o remoto avancou durante o job.
            for attempt in 1 2 3; do
              git pull --rebase origin main && git push origin HEAD:main && break
              echo "Tentativa $attempt de push falhou; tentando novamente..."
              sleep 2
            done
          else
            echo "Nenhuma mudança no gráfico para commit"
          fi