name: "🚨 Hotfix"
description: "Critical urgent fix"
title: "[HOTFIX] - "
labels: ["type:hotfix", "urgent"]
assignees: []

body:
  - type: markdown
    attributes:
      value: "## 🚨 Critical Problem Description"

  - type: textarea
    id: description
    attributes:
      label: "What is broken?"
      description: "Describe the critical problem that needs immediate fixing"
      placeholder: "Ex: ETL pipeline freezing when ingesting UCBT_tab — system without updated data..."
    validations:
      required: true

  - type: textarea
    id: impact
    attributes:
      label: "Impact"
      description: "Which functionalities are compromised?"
      placeholder: "Ex: DEC/FEC indicators not being updated. Affects main dashboard and sprint review..."
    validations:
      required: true

  - type: markdown
    attributes:
      value: "## 🔁 Steps to Reproduce"

  - type: textarea
    id: steps
    attributes:
      label: "Steps to reproduce"
      value: |
        1. 
        2. 
        3. 
    validations:
      required: true

  - type: textarea
    id: error-output
    attributes:
      label: "Error / Stack trace"
      render: shell

  - type: markdown
    attributes:
      value: "## 🗂️ Traceability"

  - type: input
    id: related-requirement
    attributes:
      label: "Related requirement"
      description: |
        Link directly to the requirement in the README using markdown.
        Example: [RF01](../../README.md#RF01)
        The README must have an anchor like <a id="RF01"> on the requirement line.
      placeholder: "[RF01](../../README.md#RF01)"

  - type: input
    id: related-user-stories
    attributes:
      label: "Related user story"
      description: |
        Link directly to the user story in the README using markdown.
        Example: [US01](../../README.md#backlog-do-produto)
        To link a specific US, add an anchor like <a id="US01"> to the README backlog table.
      placeholder: "[US01](../../README.md#backlog-do-produto)"

  - type: markdown
    attributes:
      value: "## 🏷️ Classification"

  - type: dropdown
    id: domain
    attributes:
      label: "Domain"
      options:
        - "[BACK]"
        - "[FRONT]"
        - "[INFRA]"
        - "[DATA]"
        - "[ML]"
        - "[SEC]"
        - "[QA]"
        - "[DOC]"
    validations:
      required: true

  - type: markdown
    attributes:
      value: "## 🩹 Proposed Solution"

  - type: textarea
    id: solution
    attributes:
      label: "How will it be fixed?"
      placeholder: "Ex: Reduce chunk size from 100k to 50k rows and add retry on timeout..."
    validations:
      required: true

  - type: markdown
    attributes:
      value: "## ✅ Resolution Criteria"

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: "How to validate the problem is resolved?"
      value: |
        - [ ] Problem no longer reproduces
        - [ ] Critical functionality restored
        - [ ] Tested locally via Docker Compose
        - [ ] PR reviewed and merged
    validations:
      required: true