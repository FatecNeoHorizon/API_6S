name: "✨ Feature Request"
description: "Propor uma nova funcionalidade (Scrum + DevOps)"
title: "[FEATURE] - "
labels: ["type:feature"]
assignees: []

body:
  - type: markdown
    attributes:
      value: "## 📝 Descrição da Feature"

  - type: textarea
    id: description
    attributes:
      label: "Descrição"
      description: "Descreva a funcionalidade que será desenvolvida"
      placeholder: "Ex: Implementar autenticação com JWT para melhorar segurança..."
    validations:
      required: true

  - type: markdown
    attributes:
      value: "## 🎯 Objetivo"

  - type: textarea
    id: objective
    attributes:
      label: "Qual é o objetivo desta feature?"
      description: "Qual problema resolve ou valor agrega?"
      placeholder: "Ex: Melhorar autenticação e segurança da API..."
    validations:
      required: true

  - type: markdown
    attributes:
      value: "## ✅ Critérios de Aceite"

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: "Critérios de Aceite"
      description: "O que deve ser feito para considerar completo?"
      value: |
        - [ ] Funcionalidade implementada
        - [ ] Testes unitários (min 80% cobertura)
        - [ ] Testes de integração
        - [ ] Documentação atualizada
    validations:
      required: true

  - type: markdown
    attributes:
      value: "## 📊 Requisitos Não Funcionais"

  - type: checkboxes
    id: nonfunctional-requirements
    attributes:
      label: "Requisitos DevOps"
      description: "Checklist de requisitos não funcionais"
      options:
        - label: "Pipeline CI passando (build + testes + lint)"
        - label: "Métricas e logs implementados"
        - label: "Documentação na API (Swagger/OpenAPI)"
        - label: "Testes de performance considerados"
        - label: "Monitoramento configurado"

  - type: markdown
    attributes:
      value: "## 📦 Impacto Técnico"

  - type: textarea
    id: affected-services
    attributes:
      label: "Serviços/Módulos Afetados"
      description: "Quais serviços, módulos ou componentes são impactados?"
      placeholder: "Ex: auth-service, API, frontend..."

  - type: textarea
    id: database-impact
    attributes:
      label: "Impacto no Banco de Dados"
      description: "Há mudanças no schema ou migrations necessárias?"
      placeholder: "Descreva alterações ou deixe em branco..."

  - type: textarea
    id: external-apis
    attributes:
      label: "Integrações Externas"
      description: "Integração com APIs externas ou terceiros?"
      placeholder: "Ex: Stripe, SendGrid, etc..."

  - type: textarea
    id: infrastructure
    attributes:
      label: "Infraestrutura (IaC)"
      description: "Mudanças no Terraform, Docker, variáveis de ambiente?"
      placeholder: "Alterações na infraestrutura..."

  - type: markdown
    attributes:
      value: "## 🔐 Segurança"

  - type: checkboxes
    id: security-checklist
    attributes:
      label: "Checklist de Segurança"
      options:
        - label: "Validação de inputs implementada"
        - label: "Autenticação/Autorização revisada"
        - label: "Dados sensíveis protegidos"
        - label: "Vulnerabilidades OWASP verificadas"

  - type: markdown
    attributes:
      value: "## 📌 Contexto Adicional"

  - type: dropdown
    id: priority
    attributes:
      label: "Prioridade"
      description: "Qual é a prioridade desta feature?"
      options:
        - Baixa
        - Média
        - Alta
        - Crítica
    validations:
      required: true

  - type: textarea
    id: additional-notes
    attributes:
      label: "Notas Adicionais"
      description: "Links, referências, ou informações extras"
      placeholder: "Informações adicionais relevantes..."
