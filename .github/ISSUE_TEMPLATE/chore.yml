name: "🔧 Chore / Config"
description: "Configuração, infraestrutura ou setup"
title: "[CONFIG] - "
labels: ["type:chore"]
assignees: []

body:
  - type: markdown
    attributes:
      value: "## 🔧 Descrição"

  - type: textarea
    id: description
    attributes:
      label: "O que precisa ser configurado?"
      placeholder: "Ex: Configurar índices no MongoDB antes da ingestão do UCBT_tab..."
    validations:
      required: true

  - type: dropdown
    id: config-type
    attributes:
      label: "Tipo de configuração"
      options:
        - Monorepo / Turborepo
        - Docker / Docker Compose
        - MongoDB (schema, índices, coleções)
        - PostgreSQL (schema, migrations)
        - FastAPI (setup, rotas base)
        - React (setup, dependências)
        - GitHub Actions / CI
        - Git Hooks
        - Variáveis de ambiente
        - Dependências / pacotes
        - Outro
    validations:
      required: true

  - type: markdown
    attributes:
      value: "## 🗂️ Rastreabilidade"

  - type: dropdown
    id: sprint
    attributes:
      label: "Sprint"
      options:
        - Sprint 1
        - Sprint 2
        - Sprint 3
        - Geral
    validations:
      required: true

  - type: input
    id: related-task
    attributes:
      label: "Task relacionada"
      placeholder: "Ex: TASK-01, TASK-02"

  - type: input
    id: related-requirement
    attributes:
      label: "Requisito relacionado"
      placeholder: "Ex: RF-01, RF-02, RNF-05"

  - type: textarea
    id: related-user-stories
    attributes:
      label: "User Stories relacionadas"
      placeholder: |
        Ex:
        - US-12: Como admin, quero que os índices estejam criados antes da ingestão...
        - US-07: Como analista, preciso que as queries sejam performáticas...
        
  - type: markdown
    attributes:
      value: "## 🏷️ Classificação"

  - type: dropdown
    id: domain
    attributes:
      label: "Domínio"
      options:
        - "[INFRA]"
        - "[DATA]"
        - "[BACK]"
        - "[FRONT]"
        - "[QA]"
    validations:
      required: true

  - type: input
    id: estimate
    attributes:
      label: "Estimativa"
      placeholder: "Ex: 3h"
    validations:
      required: true

  - type: markdown
    attributes:
      value: "## ✅ Critérios de Aceite"

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: "Critérios de Aceite"
      value: |
        - [ ] Configuração aplicada e funcionando
        - [ ] Testado localmente via Docker Compose
        - [ ] README de setup atualizado (se necessário)
        - [ ] Sem quebra em outros serviços
    validations:
      required: true

  - type: textarea
    id: bdgd-layers
    attributes:
      label: "Layers da BDGD envolvidos"
      description: "Preencher se a task envolve schema ou índices de dados da BDGD"
      placeholder: "Ex: UCBT_tab — índice {DIST, MUN, CONJ}, coleção nova no MongoDB..."

  - type: textarea
    id: additional-notes
    attributes:
      label: "Notas adicionais"
      placeholder: "Comandos, referências ou decisões técnicas relevantes..."